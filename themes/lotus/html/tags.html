{% extends "/html/base.html" %}
{%block subtitle %}: Tags{% endblock %}
{% block content %}
<section class="page-panel">
    <header class="page-header">
        <p class="eyebrow">Topics</p>
        <h1>Browse by tag</h1>
        <p class="lede">Use topics to jump straight into a subject area.</p>
    </header>

    <div class="taxonomy-cloud">
        {% for tag in tags %}
        <a class="tag-chip tag-chip--large" href="{{tag.uri}}">{{tag.name}}</a>
        {% endfor %}
    </div>
</section>
{% endblock %}
